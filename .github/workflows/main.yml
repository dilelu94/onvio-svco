name: Onvio SVCO Automation

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * 1-5' # Runs at 09:00 UTC (06:00 ART) Monday to Friday
  workflow_dispatch:
    inputs:
      monto:
        description: 'Monto a actualizar (opcional)'
        required: false
        default: '424,62'

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Run Onvio Automation
      env:
        ONVIO_USER: ${{ secrets.ONVIO_USER }}
        ONVIO_PASS: ${{ secrets.ONVIO_PASS }}
        MONTO_ACTUALIZAR: ${{ github.event.inputs.monto || secrets.MONTO_ACTUALIZAR || '424,62' }}
      run: npm start
